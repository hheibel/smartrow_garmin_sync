name: Presubmit Tests

# Trigger the workflow on pull requests targeting the main branch
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: garmin-syncher-491619
  WIF_PROVIDER: projects/28251301164/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deployer@garmin-syncher-491619.iam.gserviceaccount.com

jobs:
  test:
    runs-on: ubuntu-latest

    # These permissions are required for Workload Identity Federation to work
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Securely authenticate to Google Cloud using the same Identity Pool from our deploy script
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the requirements (including google-cloud-secret-manager)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the unit tests locally on the GitHub Action runner
      - name: Run Secret Manager Unit Tests
        run: |
          python -m unittest discover -s tests
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
